apiVersion: apps/v1
kind: Deployment
metadata:
  name: hola
  namespace: observability-test
  labels:
    app: hola
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hola
  template:
    metadata:
      labels:
        app: hola
    spec:
      initContainers:
        - name: fetch-certs
          image: hashicorp/vault:1.15
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache curl jq

              # Wait for Vault PKI to be ready
              until vault read pki_int/roles/service-cert > /dev/null 2>&1; do
                echo "Waiting for Vault PKI..."
                sleep 2
              done

              # Fetch CA chain
              vault read -format=json pki/cert/ca | jq -r '.data.certificate' > /certs/ca.crt
              vault read -format=json pki_int/cert/ca | jq -r '.data.certificate' >> /certs/ca.crt

              # Fetch service certificate
              CERT_DATA=$(vault write -format=json pki_int/issue/service-cert \
                common_name="hola.observability.local" \
                alt_names="localhost,hola" \
                ip_sans="127.0.0.1" \
                ttl=24h)

              echo "${CERT_DATA}" | jq -r '.data.certificate' > /certs/hola.crt
              echo "${CERT_DATA}" | jq -r '.data.private_key' > /certs/hola.key

              chmod 644 /certs/hola.crt /certs/ca.crt
              chmod 600 /certs/hola.key

              echo "Certificates fetched successfully"
          env:
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              value: "root"
          volumeMounts:
            - name: certs
              mountPath: /certs
      containers:
        - name: hola
          image: hola:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: PORT
              value: "8083"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
            - name: TLS_CERT_FILE
              value: "/certs/hola.crt"
            - name: TLS_KEY_FILE
              value: "/certs/hola.key"
            - name: TLS_CA_FILE
              value: "/certs/ca.crt"
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hola
  namespace: observability-test
spec:
  selector:
    app: hola
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
