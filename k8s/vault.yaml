apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-init-scripts
  namespace: observability-test
data:
  init-vault.sh: |
    #!/bin/bash
    set -e

    VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
    VAULT_TOKEN=${VAULT_TOKEN:-root}

    export VAULT_ADDR
    export VAULT_TOKEN

    echo "Waiting for Vault to be ready..."
    until curl -s ${VAULT_ADDR}/v1/sys/health > /dev/null 2>&1; do
      sleep 1
    done

    echo "Vault is ready. Configuring PKI..."

    # Enable PKI secrets engine for Root CA
    vault secrets enable -path=pki pki 2>/dev/null || echo "PKI already enabled"

    # Configure Root CA max lease TTL (10 years)
    vault secrets tune -max-lease-ttl=87600h pki

    # Generate Root CA
    vault write -format=json pki/root/generate/internal \
      common_name="Observability Root CA" \
      ttl=87600h > /dev/null 2>&1 || echo "Root CA already exists"

    # Configure CA and CRL URLs
    vault write pki/config/urls \
      issuing_certificates="${VAULT_ADDR}/v1/pki/ca" \
      crl_distribution_points="${VAULT_ADDR}/v1/pki/crl"

    # Enable PKI secrets engine for Intermediate CA
    vault secrets enable -path=pki_int pki 2>/dev/null || echo "PKI Int already enabled"

    # Configure Intermediate CA max lease TTL (5 years)
    vault secrets tune -max-lease-ttl=43800h pki_int

    # Generate Intermediate CA CSR
    vault write -format=json pki_int/intermediate/generate/internal \
      common_name="Observability Intermediate CA" \
      | jq -r '.data.csr' > /tmp/pki_int.csr 2>/dev/null || echo "Intermediate CSR already exists"

    # Sign Intermediate CA with Root CA
    if [ -f /tmp/pki_int.csr ]; then
      vault write -format=json pki/root/sign-intermediate \
        csr=@/tmp/pki_int.csr \
        format=pem_bundle \
        ttl=43800h \
        | jq -r '.data.certificate' > /tmp/intermediate.cert.pem

      # Import signed Intermediate certificate
      vault write pki_int/intermediate/set-signed \
        certificate=@/tmp/intermediate.cert.pem
    fi

    # Create role for service certificates
    vault write pki_int/roles/service-cert \
      allowed_domains="observability.local" \
      allow_subdomains=true \
      allow_localhost=true \
      max_ttl=72h \
      ttl=24h \
      key_type=rsa \
      key_bits=2048 \
      require_cn=true \
      cn_validations="disabled"

    echo "PKI configuration complete!"

    # Export CA chain for services
    echo "Exporting CA chain..."
    vault read -format=json pki/cert/ca | jq -r '.data.certificate' > /certs/ca.crt
    vault read -format=json pki_int/cert/ca | jq -r '.data.certificate' >> /certs/ca.crt

    echo "CA chain exported to /certs/ca.crt"
    echo "Vault PKI setup complete!"

  fetch-cert.sh: |
    #!/bin/bash
    set -e

    SERVICE_NAME=${1:-service}
    CERT_DIR=${CERT_DIR:-/certs}
    VAULT_ADDR=${VAULT_ADDR:-http://vault:8200}
    VAULT_TOKEN=${VAULT_TOKEN:-root}

    export VAULT_ADDR
    export VAULT_TOKEN

    COMMON_NAME="${SERVICE_NAME}.observability.local"

    echo "Waiting for Vault PKI to be ready..."
    until vault read pki_int/roles/service-cert > /dev/null 2>&1; do
      echo "Waiting for PKI role to be available..."
      sleep 2
    done

    echo "Fetching certificate for ${COMMON_NAME}..."

    # Request certificate from Vault
    CERT_DATA=$(vault write -format=json pki_int/issue/service-cert \
      common_name="${COMMON_NAME}" \
      alt_names="localhost,${SERVICE_NAME}" \
      ip_sans="127.0.0.1" \
      ttl=24h)

    # Extract and save certificate components
    echo "${CERT_DATA}" | jq -r '.data.certificate' > "${CERT_DIR}/${SERVICE_NAME}.crt"
    echo "${CERT_DATA}" | jq -r '.data.private_key' > "${CERT_DIR}/${SERVICE_NAME}.key"
    echo "${CERT_DATA}" | jq -r '.data.ca_chain[]' > "${CERT_DIR}/${SERVICE_NAME}-ca-chain.crt"

    # Set proper permissions
    chmod 644 "${CERT_DIR}/${SERVICE_NAME}.crt"
    chmod 600 "${CERT_DIR}/${SERVICE_NAME}.key"
    chmod 644 "${CERT_DIR}/${SERVICE_NAME}-ca-chain.crt"

    echo "Certificate for ${SERVICE_NAME} saved to ${CERT_DIR}/"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: observability-test
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "root"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: observability-test
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
  type: ClusterIP
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: observability-test
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-vault
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q -O- http://vault:8200/v1/sys/health; do sleep 2; done']
      containers:
        - name: vault-init
          image: hashicorp/vault:1.15
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache curl jq bash
              chmod +x /scripts/init-vault.sh
              chmod +x /scripts/fetch-cert.sh
              /scripts/init-vault.sh
          env:
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              value: "root"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: certs
              mountPath: /certs
      volumes:
        - name: scripts
          configMap:
            name: vault-init-scripts
            defaultMode: 0755
        - name: certs
          emptyDir: {}
