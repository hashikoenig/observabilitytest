<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observability Test - Greeting Chain</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #00d9ff;
            font-size: 2.5rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card h2 {
            margin-bottom: 1.5rem;
            color: #00d9ff;
            font-size: 1.3rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }
        input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }
        .checkbox-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .checkbox-item:hover {
            background: rgba(0, 217, 255, 0.1);
        }
        .checkbox-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-item .service-name {
            font-weight: 500;
        }
        .checkbox-item .service-lang {
            color: #888;
            font-size: 0.85rem;
        }
        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .results {
            margin-top: 2rem;
        }
        .greeting-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-left: 4px solid #00d9ff;
        }
        .greeting-message {
            font-size: 1.5rem;
            font-weight: 600;
            margin-right: 1rem;
        }
        .greeting-service {
            color: #888;
            font-size: 0.9rem;
        }
        .trace-id {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .trace-id span {
            color: #00d9ff;
        }
        .architecture {
            text-align: center;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre;
            overflow-x: auto;
            color: #888;
        }
        .error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 8px;
            color: #ff6b6b;
        }
        .loading {
            text-align: center;
            padding: 2rem;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 217, 255, 0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Observability Test</h1>

        <div class="card">
            <div class="architecture">
Gateway (Go)     Greeter (Python)     Echo (Node.js)
   "Hallo"    -->    "Bonjour"     -->    "Hello"
   :8080             :8081               :8082
            </div>
        </div>

        <div class="card">
            <h2>Configure Greeting Chain</h2>
            <div class="form-group">
                <label for="calls">Number of Call Iterations</label>
                <input type="number" id="calls" min="1" max="10" value="1">
            </div>
            <div class="form-group">
                <label>Services to Call (in order)</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="greeter" checked>
                        <div>
                            <div class="service-name">Greeter</div>
                            <div class="service-lang">Python/FastAPI</div>
                        </div>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="echo" checked>
                        <div>
                            <div class="service-name">Echo</div>
                            <div class="service-lang">Node.js/Express</div>
                        </div>
                    </label>
                </div>
            </div>
            <button id="sendBtn" onclick="sendGreeting()">Send Greeting Chain</button>
        </div>

        <div id="results" class="card results" style="display: none;">
            <h2>Response</h2>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        async function sendGreeting() {
            const calls = parseInt(document.getElementById('calls').value) || 1;
            const chain = [];

            if (document.getElementById('greeter').checked) chain.push('greeter');
            if (document.getElementById('echo').checked) chain.push('echo');

            const btn = document.getElementById('sendBtn');
            const results = document.getElementById('results');
            const content = document.getElementById('resultsContent');

            btn.disabled = true;
            results.style.display = 'block';
            content.innerHTML = '<div class="loading"></div>';

            try {
                const response = await fetch('/greet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ calls, chain }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();

                let html = '';
                for (const greeting of data.greetings) {
                    html += `
                        <div class="greeting-item">
                            <span class="greeting-message">${greeting.message}</span>
                            <span class="greeting-service">from ${greeting.service}</span>
                        </div>
                    `;
                }

                if (data.trace_id && data.trace_id !== '00000000000000000000000000000000') {
                    html += `
                        <div class="trace-id">
                            Trace ID: <span>${data.trace_id}</span>
                        </div>
                    `;
                }

                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
